  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 2.5rem 1.5rem;

  position: relative;
  overflow: hidden;

  /* IMAGEM DE FUNDO */
  background:
    linear-gradient(
      rgba(0,0,0,0.75),
      rgba(0,0,0,0.75)
    ),
    url('WhatsApp Image 2026-05-11 at 15.21.22.jpeg');
  background-size: contain;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

body::after{
  content:'';
  position:absolute;
  inset:0;

  backdrop-filter: blur(3px);

  z-index:-1;;
}
/* EFEITO LUZ */
body::before {
  content: '';
  position: absolute;
  top: -120px;
  left: 50%;

  transform: translateX(-50%);

  width: 500px;
  height: 500px;

  background: radial-gradient(
    circle,
    rgba(255,120,60,0.18) 0%,
    transparent 70%
  );

  pointer-events: none;
}

  .avatar {
  width: 130px; /* era 88px */
  height: 130px; /* era 88px */
  border-radius: 50%;
  overflow: hidden;
  margin-bottom: 1rem;
  border: 3px solid rgba(255,255,255,0.1);
  }
  .logo-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100vh;
  }

  .logo-container img {
  max-width: 300px;
  width: 100%;
  height: auto;
  }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 30px; font-weight: 1000;
      color: #FFD700;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .bio {
      font-size: 13px;
      color: rgb(254, 253, 253);
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.15s, opacity 0.15s;
      cursor: pointer;
      border: none;
    }

    .link-btn:hover { transform: scale(1.025); opacity: 0.92; }
    .link-btn:active { transform: scale(0.98); }

    .link-btn .icon-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .link-btn svg { width: 20px; height: 20px; }
    .link-btn .label { flex: 1; }
    .link-btn .arrow { opacity: 0.5; font-size: 16px; }

    /* WhatsApp */
    .btn-whatsapp { background: #1a2e1a; color: #6edd6e; }
    .btn-whatsapp .icon-wrap { background: #25D366; }
    .btn-whatsapp .icon-wrap svg { fill: #fff; }

    /* Instagram */
    .btn-instagram { background: #2a1a28; color: #f77dca; }
    .btn-instagram .icon-wrap { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .btn-instagram .icon-wrap svg { fill: #fff; }

    /* 99Pop */
    .btn-99 { background: #1e1a10; color: #ffd447; }
    .btn-99 .icon-wrap { background: #FFD700; display: flex; align-items: center; justify-content: center; }
    .btn-99 .icon-wrap span { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: #1a0a00; }

    /* iFood */
    .btn-ifood { background: #2a1010; color: #ff7676; }
    .btn-ifood .icon-wrap { background: #EA1D2C; display: flex; align-items: center; justify-content: center; }
    .btn-ifood .icon-wrap span { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; color: #fff; letter-spacing: -0.5px; }

    .footer {
      margin-top: 2rem;
      font-size: 11px;
      color: rgb(244, 243, 243);
      letter-spacing: 0.05em;
      text-align: center;
    }

  </style>
</head>
