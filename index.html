<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PR Lanches & Paraíso do Açaí</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* ── SIDE SHARED ── */
    .side {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: flex 0.55s cubic-bezier(0.77, 0, 0.18, 1);
    }

    .container:has(.side-left:hover) .side-left,
    .container:has(.side-right:hover) .side-right {
      flex: 1.45;
    }

    /* ── OVERLAY escurece o outro lado ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.45s ease;
      z-index: 1;
      pointer-events: none;
    }

    .container:has(.side-left:hover) .side-right .overlay,
    .container:has(.side-right:hover) .side-left .overlay {
      background: rgba(0,0,0,0.38);
    }

    /* ── FOTO / BG ── */
    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.55s cubic-bezier(0.77, 0, 0.18, 1),
                  filter 0.45s ease;
      filter: brightness(0.55);
    }

    .side:hover .bg {
      transform: scale(1.07);
      filter: brightness(0.35);
    }

    /* ── FOTO PLACEHOLDER (sem imagem) ── */
    .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 0;
      pointer-events: none;
    }

    .photo-placeholder svg {
      width: 52px;
      height: 52px;
      opacity: 0.35;
    }

    .photo-placeholder span {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Foto real — adicione src ao <img> dentro de .bg-img */
    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s cubic-bezier(0.77, 0, 0.18, 1),
                  filter 0.45s ease;
      filter: brightness(0.55);
    }

    .side:hover .bg-img {
      transform: scale(1.07);
      filter: brightness(0.35);
    }

    /* ── CONTEÚDO ── */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 32px;
      text-align: center;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.35s ease;
    }

    .side:hover .logo-icon { transform: scale(1.12); }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 5vw, 5rem);
      letter-spacing: 0.05em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
      transition: letter-spacing 0.4s ease;
    }

    .side:hover .brand-name { letter-spacing: 0.1em; }

    .tagline {
      font-size: clamp(0.85rem, 1.3vw, 1.1rem);
      font-weight: 600;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s;
    }

    .side:hover .tagline {
      opacity: 1;
      transform: translateY(0);
    }

    .cta-btn {
      margin-top: 10px;
      padding: 14px 38px;
      border-radius: 50px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s,
                  box-shadow 0.25s ease, filter 0.25s ease;
    }

    .side:hover .cta-btn {
      opacity: 1;
      transform: translateY(0);
    }

    .cta-btn:hover {
      filter: brightness(1.12);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    /* ── DIVISOR ── */
    .divider {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 60vh;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.5), transparent);
      z-index: 10;
      pointer-events: none;
    }

    /* ══ ESQUERDA — PR Lanches ══ */
    .side-left { background: #1a0a00; }

    .side-left .bg {
      background-image: url(''); /* ← cole aqui a URL da foto do PR Lanches */
      background-color: #2c1200;
    }

    .side-left .logo-icon { background: linear-gradient(135deg, #ff6a00, #ee0979); }

    .side-left .cta-btn {
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      color: #fff;
    }

    /* ══ DIREITA — Paraíso do Açaí ══ */
    .side-right { background: #0d001a; }

    .side-right .bg {
      background-image: url(''); /* ← cole aqui a URL da foto do Paraíso do Açaí */
      background-color: #1a003a;
    }

    .side-right .logo-icon { background: linear-gradient(135deg, #7b2ff7, #f107a3); }

    .side-right .cta-btn {
      background: linear-gradient(135deg, #7b2ff7, #f107a3);
      color: #fff;
    }

    /* ── RIPPLE ao clicar ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple-anim 0.65s ease-out forwards;
      pointer-events: none;
      z-index: 20;
    }

    @keyframes ripple-anim {
      to { transform: scale(60); opacity: 0; }
    }

    /* ── RESPONSIVO (mobile empilha) ── */
    @media (max-width: 600px) {
      .container { flex-direction: column; }
      .divider { width: 60vw; height: 2px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
      .side { flex: 1; }
      .container:has(.side-left:hover) .side-left,
      .container:has(.side-right:hover) .side-right { flex: 1.45; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ══ PR LANCHES ══ -->
  <div class="side side-left"
       onclick="goTo('PR.html', event)"
       title="Visitar PR Lanches">

    <!-- Troque o src pela URL ou caminho da sua foto -->
    <img class="bg-img" src="img/fotopr.jpeg" alt="PR Lanches" onerror="this.style.display='none'"/>

    <!-- Fundo sólido + placeholder enquanto não tem foto -->
    <div class="bg"></div>

    <div class="photo-placeholder">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16l4-4 4 4 4-6 6 8H3z"/>
        <circle cx="8.5" cy="8.5" r="1.5" stroke="white" stroke-width="1.5"/>
        <rect x="2" y="3" width="20" height="18" rx="2" stroke="white" stroke-width="1.5"/>
      </svg>
      <span><img class="bg-img" src="img/fotopr.jpeg" alt="PR Lanches" onerror="this.style.display='none'"/></span>
    </div>

    <div class="overlay"></div>

    <div class="content">
      <div class="logo-icon">🍔</div>
      <h1 class="brand-name">PR Lanches</h1>
      <p class="tagline">Sabor que conquista — cada mordida</p>
      <button class="cta-btn">Conheça o cardápio →</button>
    </div>
  </div>

  <!-- DIVISOR central -->
  <div class="divider"></div>

  <!-- ══ PARAÍSO DO AÇAÍ ══ -->
  <div class="side side-right"
       onclick="goTo('AÇAI.html', event)"
       title="Visitar Paraíso do Açaí">

    <!-- Troque o src pela URL ou caminho da sua foto -->
    <img class="bg-img" src="img/fotoaçai.jpeg" alt="Paraíso do Açaí" onerror="this.style.display='none'"/>

    <div class="bg"></div>

    <div class="photo-placeholder">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16l4-4 4 4 4-6 6 8H3z"/>
        <circle cx="8.5" cy="8.5" r="1.5" stroke="white" stroke-width="1.5"/>
        <rect x="2" y="3" width="20" height="18" rx="2" stroke="white" stroke-width="1.5"/>
      </svg>
      <span><img class="bg-img" src="img/fotoaçai.jpeg" alt="Paraíso do Açaí" onerror="this.style.display='none'"/></span>
    </div>

    <div class="overlay"></div>

    <div class="content">
      <div class="logo-icon">🍇</div>
      <h1 class="brand-name">Paraíso do Açaí</h1>
      <p class="tagline">Fresco, natural & irresistível</p>
      <button class="cta-btn">Ver opções →</button>
    </div>
  </div>

</div>

<script>
  function goTo(url, e) {
    // Efeito ripple
    const side = e.currentTarget;
    const rect = side.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = (e.clientX - rect.left - 4) + 'px';
    ripple.style.top  = (e.clientY - rect.top  - 4) + 'px';
    side.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());

    // Abre o link
    setTimeout(() => window.open(url, '_blank'), 280);
  }
</script>

</body>
</html>
