<!DOCTYPE html>
<html>
<head>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
function initMap() {
    const local = {
        lat: -12.9714,
        lng: -38.5014
    };

    const map = new google.maps.Map(
        document.getElementById("map"),
        {
            zoom: 15,
            center: local,
        }
    );

    new google.maps.Marker({
        position: local,
        map: map,
        title: "Minha Loja"
    });
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_API&callback=initMap">
</script>

</body>
</html>
